# Local multi-tenant testing stack (works great with OrbStack).
#
#   docker compose up --build
#   docker compose exec app pnpm seed:tenants      # first run only
#
# Then open (OrbStack/your browser resolve *.localhost to 127.0.0.1 automatically):
#   http://frokostkonsortiet.localhost:3000   → main site (aggregator)
#   http://smagssans.localhost:3000           → Smagssans kitchen
#   http://frajorden.localhost:3000           → Fra Jorden kitchen
#   http://localhost:3000/admin               → shared Payload admin
#
# Dependencies live in the image (see Dockerfile.dev); only ./src is bind-mounted
# for live reload, so nothing is written back into your working tree.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - media:/app/public/media
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      # Overrides .env for the container network.
      DATABASE_URL: mongodb://mongo:27017/frokost-konsortiet
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      # Proxy resolves the domain map against this stable origin (the *.localhost
      # request host isn't resolvable from inside the Alpine container).
      INTERNAL_URL: http://localhost:3000
      TENANT_ORIGINS: 'http://localhost:3000,http://frokostkonsortiet.localhost:3000,http://smagssans.localhost:3000,http://frajorden.localhost:3000'
      NODE_OPTIONS: --no-deprecation

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

volumes:
  data:
  media:
